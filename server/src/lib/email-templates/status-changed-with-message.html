<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Exported from Figma" />
    <title>Application Received</title>
    <link
      href="https://fonts.googleapis.com/css?family=Inter&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: sans-serif;
      }

      p {
        color: #636363;
        font-size: 14px;
      }

      .outer-container {
        margin: auto;
        width: 80%;
        background-color: #f5f5f4;
        padding: 50px;
      }

      .paragraph-muted {
        color: #9ca3af !important;
      }

      .inner-container {
        max-width: 500px;
        background-color: white;
        margin: auto;
        padding: 20px;
        padding-top: 0px;
        margin: auto;
        border-radius: 20px;
        position: relative;
      }

      .logo {
        left: 20px;
        width: 65px;
        margin-bottom: 15px;
      }

      .recruiter-message {
        margin-top: 8px;
        display: block;
        margin-bottom: 20px !important;
        padding: 8px 10px;
        border-radius: 8px;
        background-color: #f5f5f4;
      }

      .intro-paragraph {
        display: block;
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <div class="outer-container">
      <div class="inner-container">
        <img
          class="logo"
          src="https://res.cloudinary.com/sudarshanbashyal/image/upload/v1772630673/Group_40_uwwlkt.png"
        />

        <p class="intro-paragraph">Hello {{firstName}},</p>
        <p>
          There’s an update on your application for the
          <strong>{{jobTitle}}</strong> position, your status has been changed
          to {{newStatus}}. The recruiter will follow up with more details soon.
          In the meantime, here’s a message they’ve shared with you:
        </p>
        <p class="recruiter-message">{{message}}</p>

        <p class="paragraph-muted">
          Best Regards,<br />
          Hire.ly
        </p>
      </div>
    </div>
  </body>
</html>
