<div class="modal-container">
  <div class="modal-content">
    <div class="modal-title">
      <h2>Change Application Status</h2>
    </div>

    <div *ngIf="application" class="modal-body">
      <p>
        Are you sure you want to change the applications status from
        <strong class="application-status">{{
          application.applicationStatus.toLowerCase()
          }}</strong>
        to
        <strong class="application-status">{{ selectedStatus?.text }}</strong>?
      </p>

      <form [formGroup]="form">
        <textarea formControlName="note" placeholder="Add note for the candidate"></textarea>
      </form>

      <div class="action-buttons">
        <button class="text-btn cancel-btn" (click)="closeModal()">Cancel</button>
        <button class="btn-primary" (click)="changeStatus()">Change Status</button>
      </div>
    </div>
  </div>
</div>
